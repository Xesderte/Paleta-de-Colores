<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
    <div class="layout-principal">
        <main>
            <header>
                <h1>Generador de Paletas</h1>
            </header>

            <div id="controles-superiores">
                <div id="cantidadColores">
                    <span>Cantidad:</span>
                    <button class="cantidad" data-cantidad="6">6</button>
                    <button class="cantidad" data-cantidad="8">8</button>
                    <button class="cantidad" data-cantidad="9">9</button>
                </div>

                <div id="formatoColores">
                    <span>Formato:</span>
                    <label><input type="radio" name="formato" value="hex" checked> HEX</label>
                    <label><input type="radio" name="formato" value="hsl"> HSL</label>
                    <label><input type="radio" name="formato" value="rgba"> RGBA</label>
                </div>
            </div>

            <div class="controles-principales">
                <button id="generarBtn">GENERAR PALETA</button>
                <button id="guardarBtn">GUARDAR PALETA</button>
            </div>

            <div id="contenedor" aria-live="polite"></div>
            <p id="mensaje" style="display: none;"></p>
        </main>

        <aside id="historial-container">
            <h2>Historial de Paletas</h2>
            <div id="lista-paletas"></div>
            <button id="borrarHistorial">Limpiar Historial</button>
        </aside>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
