<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paletas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Generador de Paletas</h1>
    </header>

    <main>
        <div id="cantidadColores">
            <span>Cantidad de colores:</span>
            <button class="cantidad" data-cantidad="6" aria-label="Generar paleta de 6 colores">6</button>
            <button class="cantidad" data-cantidad="8" aria-label="Generar paleta de 8 colores">8</button>
            <button class="cantidad" data-cantidad="9" aria-label="Generar paleta de 9 colores">9</button>
        </div>

        <div class="controles-principales">
            <button id="generarBtn" aria-label="Generar colores aleatorios">GENERAR</button>
            <button id="guardarBtn" aria-label="Guardar paleta actual">GUARDAR PALETA</button>
        </div>

        <div id="contenedor" aria-live="polite"></div>
        <p id="mensaje" style="display: none;"></p>
    </main>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
